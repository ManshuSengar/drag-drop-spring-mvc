server.port=8080
spring.application.name=file-upload-spring
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.file-size-threshold=2KB
app.upload.dir=${user.home}/uploads
app.upload.max-file-size=52428800
app.upload.allowed-extensions=jpg,jpeg,png,gif,bmp,webp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,csv,zip,rar,7z,mp4,mp3
app.upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/bmp,image/webp,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain,text/csv,application/zip
spring.thymeleaf.cache=false
logging.level.com.fileupload=DEBUG
